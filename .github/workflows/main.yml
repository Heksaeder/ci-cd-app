name: Build, Test, Publish and Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: npm ci
        run: npm ci
      - name: Generate jsdoc
        run: npm run jsdoc
      - name: build and test
        env:
          REACT_APP_API_URL: https://ci-cd-app-6y49.onrender.com
        run: |
          npm run build --if-present
          npm test
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build
          if-no-files-found: error

  cypress_e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: npm ci
        run: npm ci
      - name: Run Cypress tests (mocked backend)
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/!(Registration).cy.js

  cypress_online_offline:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    strategy:
      matrix:
        offline: [false, true]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: npm ci
        run: npm ci
      - name: Run Cypress tests (offline=${{ matrix.offline }})
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          start: npm start
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
          browser: chrome
          spec: cypress/e2e/Registration.cy.js
        env:
          CYPRESS_offline: ${{ matrix.offline }}

  infra_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: docker compose up -d
        env:
          POSTGRES_PASSWORD: ci_placeholder
          POSTGRES_DATABASE: ci_cd_ynov
          ADMIN_EMAIL: ci_placeholder@example.com
          ADMIN_PASSWORD: ci_placeholder_password
          JWT_SECRET: ci_placeholder_secret
        run: docker compose up -d --build

      - name: Wait for backend to be ready
        run: npx --yes wait-on http://localhost:8000/health/db --timeout 120000

      - name: Test infra
        run: |
          curl -fsS http://localhost:8000/health/db
          docker compose exec -T db pg_isready -U postgres

      - name: docker compose down backend
        run: docker compose stop server

      - name: Verify backend is now unreachable
        run: |
          if curl -fsS --max-time 5 http://localhost:8000/health/db; then
            echo "Le backend répond encore alors qu'il devrait être arrêté" && exit 1
          else
            echo "Backend correctement arrêté"
          fi

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  docker_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker compose config
        run: docker compose config
      - name: Build all Docker images
        env:
          POSTGRES_PASSWORD: ci_placeholder
          POSTGRES_DATABASE: ci_cd_ynov
          ADMIN_EMAIL: ci_placeholder@example.com
          ADMIN_PASSWORD: ci_placeholder
          JWT_SECRET: ci_placeholder
        run: docker compose build

  deploy_render:
    needs: [build_test, docker_build]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  deploy:
    needs: build_test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish_npm:
    needs: build_test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: npm ci
      - name: Check if version changed
        id: check
        run: |
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED_VERSION=$(npm view $(node -p "require('./package.json').name") version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL_VERSION" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED_VERSION" >> $GITHUB_OUTPUT
          if [ "$LOCAL_VERSION" != "$PUBLISHED_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      - name: Build and publish package
        if: steps.check.outputs.changed == 'true'
        run: |
          npm run build-npm-ci
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}